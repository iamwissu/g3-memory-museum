<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CRMEF Memory Museum</title>

<!--
  ============================================================================
  CRMEF MEMORY MUSEUM — single-file interactive experience (v2, "walk-through" edition)
  ============================================================================
  HOW TO MAINTAIN THIS MUSEUM (you do not need to know how to code)
  ----------------------------------------------------------------------------
  Everything you will ever want to edit lives in ONE place: the big
  "MUSEUM DATA" object inside the <script> tag near the bottom of this file.
  Search for the text "EDIT YOUR CONTENT HERE" to jump straight to it.

  1. ADD A NEW PHOTO TO AN EXISTING GALLERY (e.g. Hangouts)
     a) Drop the image file inside that gallery's folder — for example the
        "Hangouts" folder, right next to this HTML file.
     b) In MUSEUM DATA, find that gallery's `photos:` list and add one line
        like the ones already there:
          photo('Hangouts 8.jpg', 'Title', 'Short description.', 'Date')
     Save the file — that's it, no other changes needed.

  2. ADD A NEW CLASSMATE PORTRAIT
     Put the photo in the "Portraits" folder, then add one line to the
     `classmates:` list, following the pattern already there.

  3. CHANGE ANY CAPTION, QUOTE, TITLE OR DATE
     Just edit the text between quotes in MUSEUM DATA. Nothing else needs
     to change — the whole museum rebuilds itself automatically.

  4. ADD A WHOLE NEW GALLERY / EXHIBITION ROOM 
     Copy one of the existing gallery blocks (the { id: ... } sections),
     give it a new `id`, `folder` and `name`, fill in its photos, then add
     its id to the ROOM_ORDER list further down so it appears in the
     sidebar and the museum map.

  5. THE FAREWELL MESSAGE at the very end of the museum is the
     `farewellMessage` field, near the bottom of MUSEUM DATA.
  ============================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@300;400;500;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ==========================================================================
   1. DESIGN TOKENS
   ========================================================================== */
:root{
  --wall:            #f8f6f1;
  --wall-deep:        #efe9dc;
  --wall-shadow:      #d9d0bc;
  --floor-1:          #3a2414;
  --floor-2:          #6b4423;
  --floor-3:          #8a5a34;

  --ink:              #221c16;
  --ink-soft:         #5c5148;
  --ink-faint:        #9a8f80;
  --paper:            #fffdf8;

  --brass:            #a9834f;
  --brass-light:      #d9bc8b;
  --brass-dark:       #7a5c33;

  --wine:             #5c1f26;
  --wine-light:       #8a3540;

  /* Creative Gallery accent — a cooler, more dramatic palette for that room only */
  --violet:           #7c5cff;
  --violet-light:     #b9a4ff;
  --crimson:          #c23b4f;

  --radius-frame:     3px;
  --shadow-frame:     0 2px 4px rgba(20,14,6,.25), 0 18px 34px -12px rgba(20,14,6,.45);
  --ease-museum:      cubic-bezier(.22,.61,.36,1);
  --dur-room:         900ms;

  --font-display:     'Playfair Display', Georgia, 'Times New Roman', serif;
  --font-quote:       'Cormorant Garamond', Georgia, serif;
  --font-body:        'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-label:       'Jost', 'Inter', sans-serif;
}

/* ==========================================================================
   2. RESET
   ========================================================================== */
*,*::before,*::after{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0;
  background:var(--wall);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
img{ max-width:100%; display:block; }
button{ font-family:inherit; cursor:pointer; }
h1,h2,h3,p{ margin:0; }
a{ color:inherit; }
::selection{ background:var(--brass-light); color:var(--ink); }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important; }
}

a:focus-visible, button:focus-visible, [tabindex]:focus-visible{
  outline:2px solid var(--brass);
  outline-offset:3px;
  border-radius:4px;
}

/* ==========================================================================
   3. AMBIENT TEXTURE
   ========================================================================== */
.wall-grain{
  position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.5;
  background-image: radial-gradient(circle at 15% 10%, rgba(255,255,255,.6), transparent 40%),
                     radial-gradient(circle at 85% 90%, rgba(255,255,255,.4), transparent 45%);
}

/* ==========================================================================
   4. ENTRANCE HALL — museum facade + doors
   ========================================================================== */
#entrance{
  position:fixed; inset:0; z-index:150;
  display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(ellipse 60% 50% at 50% 22%, rgba(255,247,225,.85), transparent 65%),
    linear-gradient(180deg, var(--wall) 0%, var(--wall-deep) 78%, var(--floor-2) 100%);
  transition: opacity 1.1s var(--ease-museum), visibility 1.1s var(--ease-museum);
}
#entrance.hidden{ opacity:0; visibility:hidden; pointer-events:none; }

.facade{
  text-align:center;
  max-width:680px;
  padding:0 28px;
  animation: driftIn 1.6s var(--ease-museum) both;
  perspective:1800px;
}
@keyframes driftIn{
  from{ opacity:0; transform:translateY(26px); }
  to{ opacity:1; transform:translateY(0); }
}
.facade.camera-move{ animation: cameraPush 1s var(--ease-museum) .5s both; }
@keyframes cameraPush{
  from{ transform:scale(1); opacity:1; }
  to{ transform:scale(1.14); opacity:0; }
}

.entrance-eyebrow{
  font-family:var(--font-label);
  letter-spacing:.32em;
  text-transform:uppercase;
  font-size:12px;
  color:var(--brass-dark);
  margin-bottom:18px;
  display:inline-flex; align-items:center; gap:14px;
}
.entrance-eyebrow::before,.entrance-eyebrow::after{
  content:''; width:34px; height:1px; background:var(--brass);
}
.entrance-title{
  font-family:var(--font-display);
  font-weight:600;
  font-size:clamp(2.3rem, 6vw, 4.2rem);
  line-height:1.05;
  letter-spacing:-.01em;
  color:var(--ink);
}
.entrance-subtitle{
  font-family:var(--font-quote);
  font-style:italic;
  font-size:clamp(1.05rem, 2.4vw, 1.35rem);
  color:var(--ink-soft);
  margin-top:14px;
}

/* --- the doors themselves --- */
.door-frame{
  position:relative;
  width:min(520px, 78vw);
  height:min(320px, 42vh);
  margin:34px auto 0;
  border-radius:14px 14px 5px 5px;
  overflow:hidden;
  background:#150d07;
  box-shadow: inset 0 0 50px rgba(0,0,0,.6), 0 24px 60px -20px rgba(20,10,4,.55);
  transform-style:preserve-3d;
}
.door-frame::before{ /* stone archway trim */
  content:''; position:absolute; inset:0; border-radius:14px 14px 5px 5px;
  box-shadow: inset 0 0 0 8px rgba(255,253,248,.9), inset 0 0 0 10px var(--brass);
  pointer-events:none; z-index:5;
}
.door-glow{
  position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 50%, rgba(255,226,164,.95), rgba(150,100,50,.25) 55%, transparent 78%);
  opacity:0; transition:opacity 1.1s ease .35s; z-index:1;
}
.door-frame.opening .door-glow{ opacity:1; }

.door{
  position:absolute; top:0; bottom:0; width:50%; z-index:2;
  background:
    linear-gradient(90deg, rgba(0,0,0,.35), transparent 8%, transparent 92%, rgba(0,0,0,.35)),
    linear-gradient(160deg,#6b4423,#3a2414 60%,#2a1a0e);
  transition: transform 1.5s cubic-bezier(.65,0,.35,1);
  will-change: transform;
}
.door::before{ content:''; position:absolute; inset:16px; border:2px solid rgba(0,0,0,.28); border-radius:4px; }
.door::after{ content:''; position:absolute; inset:34px; border:1px solid rgba(0,0,0,.22); border-radius:3px; }
.door-left{ left:0; transform-origin:left center; border-right:2px solid rgba(0,0,0,.45); }
.door-right{ right:0; transform-origin:right center; border-left:2px solid rgba(0,0,0,.45); }
.door-handle{
  position:absolute; top:50%; width:9px; height:34px; border-radius:6px; transform:translateY(-50%);
  background:linear-gradient(180deg,var(--brass-light),var(--brass-dark));
  box-shadow:0 2px 6px rgba(0,0,0,.5);
}
.door-left .door-handle{ right:20px; }
.door-right .door-handle{ left:20px; }

.door-frame.opening .door-left{ transform: rotateY(-112deg); }
.door-frame.opening .door-right{ transform: rotateY(112deg); }

.begin-btn{
  margin-top:34px;
  background:var(--ink);
  color:var(--paper);
  border:1px solid var(--ink);
  padding:17px 46px;
  font-family:var(--font-label);
  letter-spacing:.14em;
  text-transform:uppercase;
  font-size:13px;
  border-radius:2px;
  position:relative;
  overflow:hidden;
  transition:transform .45s var(--ease-museum), box-shadow .45s var(--ease-museum), opacity .4s ease;
  box-shadow:0 10px 26px -12px rgba(20,14,6,.5);
}
.begin-btn::before{
  content:''; position:absolute; inset:0; left:-110%;
  background:linear-gradient(100deg, transparent, rgba(255,255,255,.28), transparent);
  transition:left .7s var(--ease-museum);
}
.begin-btn:hover{ transform:translateY(-3px); box-shadow:0 16px 34px -14px rgba(20,14,6,.6); }
.begin-btn:hover::before{ left:110%; }
.begin-btn[disabled]{ opacity:.45; pointer-events:none; }

.entrance-hint{ margin-top:18px; font-size:12px; color:var(--ink-faint); letter-spacing:.04em; }

.sound-toggle{
  position:absolute; top:26px; right:26px; z-index:5;
  display:flex; align-items:center; gap:10px;
  background:transparent; border:1px solid var(--wall-shadow);
  color:var(--ink-soft);
  padding:9px 16px; border-radius:30px;
  font-size:12px; letter-spacing:.06em;
  transition:border-color .3s, color .3s, background .3s;
}
.sound-toggle:hover{ border-color:var(--brass); color:var(--ink); background:rgba(169,131,79,.07); }
.sound-toggle svg{ width:15px; height:15px; }

.motes{ position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.mote{ position:absolute; width:3px; height:3px; border-radius:50%; background:var(--brass-light); opacity:.5; animation:float linear infinite; }
@keyframes float{
  from{ transform:translateY(10vh) translateX(0); opacity:0; }
  10%{ opacity:.6; } 90%{ opacity:.4; }
  to{ transform:translateY(-40vh) translateX(20px); opacity:0; }
}

/* ==========================================================================
   4b. HALLWAY — the "walking between rooms" transition
   ========================================================================== */
.hallway{
  position:fixed; inset:0; z-index:120;
  background:#0c0805;
  display:flex; align-items:center; justify-content:center;
  opacity:0; visibility:hidden;
  transition:opacity .45s ease, visibility .45s ease;
}
.hallway.active{ opacity:1; visibility:visible; }
.hallway-corridor{
  position:absolute; inset:0; overflow:hidden;
}
.hallway-corridor::before{
  content:''; position:absolute; inset:-20%;
  background: repeating-conic-gradient(from 0deg at 50% 50%,
    rgba(255,244,220,.05) 0deg 1.2deg, transparent 1.2deg 9deg);
  animation: corridorSpin 6s linear infinite;
}
.hallway-corridor::after{
  content:''; position:absolute; inset:0;
  background: radial-gradient(circle at 50% 50%, rgba(255,224,170,.18), transparent 55%);
  animation: corridorPulse 1.1s var(--ease-museum) infinite alternate;
}
@keyframes corridorSpin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
@keyframes corridorPulse{ from{ transform:scale(.9); opacity:.7; } to{ transform:scale(1.25); opacity:1; } }
.hallway-label{
  position:relative; z-index:2;
  font-family:var(--font-quote); font-style:italic; color:var(--brass-light);
  font-size:1.2rem; letter-spacing:.02em;
}

/* ==========================================================================
   5. MUSEUM SHELL — nav rail + rooms
   ========================================================================== */
#museum{ position:relative; z-index:1; min-height:100vh; padding-left:250px; }

.nav-rail{
  position:fixed; top:0; left:0; bottom:0; width:250px;
  background:linear-gradient(180deg, rgba(255,253,248,.96), rgba(248,246,241,.92));
  border-right:1px solid var(--wall-shadow);
  backdrop-filter:blur(6px);
  z-index:80;
  display:flex; flex-direction:column;
  padding:30px 0;
  transition:opacity .8s ease, visibility .8s ease, transform .4s var(--ease-museum);
}
.nav-close{
  display:none; align-self:flex-end; margin:0 18px 6px auto;
  width:34px; height:34px; border-radius:50%; border:none; background:var(--wall-deep);
  color:var(--ink); align-items:center; justify-content:center;
}
.nav-close svg{ width:16px; height:16px; }
.nav-brand{
  font-family:var(--font-display); font-weight:600; font-size:1.05rem;
  padding:0 26px 22px; border-bottom:1px solid var(--wall-shadow);
  margin-bottom:10px; cursor:pointer; line-height:1.3;
}
.nav-brand span{ display:block; font-family:var(--font-label); font-size:10px; letter-spacing:.24em; color:var(--brass-dark); text-transform:uppercase; margin-top:6px; }

.nav-list{ list-style:none; padding:6px 14px; margin:0; overflow-y:auto; flex:1; }
.nav-item{
  display:flex; align-items:baseline; gap:12px;
  width:100%; text-align:left; background:none; border:none;
  padding:12px 12px; border-radius:8px; color:var(--ink-soft);
  font-family:var(--font-body); font-size:14.5px;
  transition:background .3s, color .3s, transform .3s;
}
.nav-item .num{ font-family:var(--font-label); font-size:11px; color:var(--brass); letter-spacing:.06em; }
.nav-item:hover{ background:var(--wall-deep); color:var(--ink); transform:translateX(2px); }
.nav-item.active{ background:var(--ink); color:var(--paper); }
.nav-item.active .num{ color:var(--brass-light); }
.nav-item.secret{ color:var(--wine); animation:pulseSecret 2.4s ease-in-out infinite; }
@keyframes pulseSecret{ 0%,100%{ box-shadow:0 0 0 0 rgba(92,31,38,0); } 50%{ box-shadow:0 0 0 4px rgba(92,31,38,.08);} }

.nav-foot{ padding:16px 26px 0; border-top:1px solid var(--wall-shadow); margin-top:10px; }
.nav-sound{ display:flex; align-items:center; gap:9px; background:none; border:none; color:var(--ink-faint); font-size:12px; padding:8px 0; }
.nav-sound:hover{ color:var(--ink); }
.nav-sound svg{ width:14px; height:14px; }

.nav-mobile{
  display:none;
  position:fixed; left:0; right:0; bottom:0; z-index:40;
  background:rgba(255,253,248,.97); backdrop-filter:blur(8px);
  border-top:1px solid var(--wall-shadow);
  padding:12px 12px calc(12px + env(safe-area-inset-bottom));
  overflow-x:auto; white-space:nowrap;
  transition:opacity .8s ease, visibility .8s ease;
}
.nav-mobile .nav-item{
  display:inline-flex; align-items:center; width:auto; white-space:nowrap;
  margin-right:10px; padding:11px 16px; border-radius:22px; font-size:13px;
  border:1px solid transparent;
}
.nav-mobile .nav-item .num{ font-size:10px; }
.nav-mobile .nav-item:hover{ border-color:var(--wall-shadow); }
.nav-mobile .nav-item.active{ border-color:var(--ink); }
.nav-mobile .nav-item:last-child{ margin-right:2px; }

/* hamburger + backdrop for the mobile slide-in sidebar */
.hamburger{
  display:none; position:fixed; top:18px; left:18px; z-index:90;
  width:44px; height:44px; border-radius:50%;
  background:var(--ink); color:var(--paper); border:1px solid rgba(255,255,255,.15);
  align-items:center; justify-content:center; box-shadow:var(--shadow-frame);
  transition:opacity .8s ease, visibility .8s ease;
}
.hamburger svg{ width:19px; height:19px; }
.nav-backdrop{
  display:none; position:fixed; inset:0; z-index:70;
  background:rgba(10,7,4,.5);
  opacity:0; visibility:hidden; transition:opacity .4s ease, visibility .4s ease;
}
.nav-backdrop.open{ opacity:1; visibility:visible; }

/* fade navigation away in the final hall */
#museum.is-final .nav-mobile,
#museum.is-final .map-toggle{ opacity:0; visibility:hidden; pointer-events:none; }
.hamburger.is-final, .nav-rail.is-final{ opacity:0; visibility:hidden; pointer-events:none; }

.room{
  min-height:100vh;
  padding:96px 6vw 120px;
  display:none;
  opacity:0; transform:translateY(24px) scale(.99);
}
.room.active{ display:block; animation:roomEnter var(--dur-room) var(--ease-museum) forwards; }
@keyframes roomEnter{
  from{ opacity:0; transform:translateY(24px) scale(.99); }
  to{ opacity:1; transform:translateY(0) scale(1); }
}

.room-eyebrow{
  font-family:var(--font-label); letter-spacing:.3em; text-transform:uppercase;
  font-size:12px; color:var(--brass-dark); margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}
.room-eyebrow::after{ content:''; flex:1; max-width:70px; height:1px; background:var(--brass); }
.room-title{ font-family:var(--font-display); font-weight:600; font-size:clamp(2.1rem,4.4vw,3.4rem); color:var(--ink); }
.room-desc{ font-family:var(--font-body); color:var(--ink-soft); max-width:640px; margin-top:14px; font-size:15.5px; line-height:1.7; }

.wall-quote{ margin:52px 0 60px; padding:38px 0; position:relative; border-top:1px solid var(--wall-shadow); border-bottom:1px solid var(--wall-shadow); }
.wall-quote p{ font-family:var(--font-quote); font-style:italic; font-weight:500; font-size:clamp(1.3rem,3vw,2rem); color:var(--ink); max-width:820px; line-height:1.45; }
.wall-quote cite{ display:block; margin-top:16px; font-style:normal; font-family:var(--font-label); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); }

/* ==========================================================================
   6. FRAMES & PLAQUES
   ========================================================================== */
.frame-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:64px 34px; }

.exhibit{ opacity:0; transform:translateY(18px); transition:opacity .7s var(--ease-museum), transform .7s var(--ease-museum); }
.exhibit.in-view{ opacity:1; transform:translateY(0); }
.exhibit.featured{ grid-column:span 2; grid-row:span 2; }
@media (max-width:640px){ .exhibit.featured{ grid-column:span 1; } }

.frame{
  position:relative; height:100%;
  background:var(--paper); padding:14px 14px 18px;
  border-radius:var(--radius-frame); box-shadow:var(--shadow-frame);
  cursor:pointer; transform:translateZ(0);
  transition:transform .5s var(--ease-museum), box-shadow .5s var(--ease-museum);
  display:flex; flex-direction:column;
}
.frame:hover{ transform:translateY(-6px); box-shadow:0 6px 10px rgba(20,14,6,.22), 0 30px 46px -16px rgba(20,14,6,.55); }
.frame:hover .spotlight{ opacity:1; }

.spotlight{
  position:absolute; left:50%; top:-36px; width:220px; height:80px; transform:translateX(-50%);
  background:radial-gradient(ellipse at 50% 100%, rgba(255,236,190,.55), transparent 70%);
  opacity:0; transition:opacity .5s var(--ease-museum); pointer-events:none;
}
.featured-tag{
  position:absolute; top:8px; left:8px; z-index:3;
  background:var(--ink); color:var(--brass-light);
  font-family:var(--font-label); font-size:9.5px; letter-spacing:.18em; text-transform:uppercase;
  padding:6px 10px; border-radius:2px; box-shadow:0 4px 10px rgba(0,0,0,.3);
}

.frame-photo{ aspect-ratio:4/5; width:100%; overflow:hidden; border-radius:2px; background:linear-gradient(135deg,#e9e2d4,#d8cdb8); border:1px solid rgba(0,0,0,.06); flex:1; }
.exhibit.featured .frame-photo{ aspect-ratio:1/1; }
.frame-photo img{ width:100%; height:100%; object-fit:cover; transition:transform .8s var(--ease-museum); }
.frame:hover .frame-photo img{ transform:scale(1.045); }

.plaque{ margin-top:14px; text-align:center; padding-top:2px; }
.plaque .p-title{ font-family:var(--font-display); font-weight:600; font-size:16px; color:var(--ink); }
.plaque .p-desc{ font-family:var(--font-quote); font-style:italic; font-size:14.5px; color:var(--ink-soft); margin-top:5px; line-height:1.4; }
.plaque .p-date{ font-family:var(--font-label); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--brass); margin-top:8px; }

/* ==========================================================================
   7. CREATIVE GALLERY — darker walls, dramatic spotlights, floating frames
   ========================================================================== */
.room[data-theme="dark"]{
  background:
    radial-gradient(ellipse 70% 45% at 50% 0%, rgba(124,92,255,.18), transparent 62%),
    radial-gradient(ellipse 60% 40% at 85% 70%, rgba(194,59,79,.12), transparent 60%),
    linear-gradient(180deg, #150f1c 0%, #0d0a13 60%);
  color:var(--paper);
}
.room[data-theme="dark"] .room-eyebrow{ color:var(--violet-light); }
.room[data-theme="dark"] .room-eyebrow::after{ background:var(--violet); }
.room[data-theme="dark"] .room-title{ color:var(--paper); }
.room[data-theme="dark"] .room-desc{ color:#c9bfe0; }
.room[data-theme="dark"] .wall-quote{ border-color:rgba(255,255,255,.14); }
.room[data-theme="dark"] .wall-quote p{ color:var(--paper); }
.room[data-theme="dark"] .wall-quote cite{ color:#a397c0; }

.room[data-theme="dark"] .exhibit{ animation:floatFrame 6.5s ease-in-out infinite; }
.room[data-theme="dark"] .exhibit:nth-child(odd){ animation-delay:-1.5s; }
.room[data-theme="dark"] .exhibit:nth-child(3n){ animation-delay:-3.2s; }
@keyframes floatFrame{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-9px); } }

.room[data-theme="dark"] .frame{ background:#1c1626; box-shadow:0 2px 4px rgba(0,0,0,.5), 0 24px 50px -16px rgba(124,92,255,.4); }
.room[data-theme="dark"] .frame-photo{ background:linear-gradient(135deg,#2a2438,#181322); border-color:rgba(255,255,255,.08); }
.room[data-theme="dark"] .plaque .p-title{ color:var(--paper); }

.room[data-theme="dark"] .featured-tag{ background:var(--violet); color:#fff; }

/* ==========================================================================

   ========================================================================== */
.classmates-wall{ column-count:4; column-gap:28px; }
@media (max-width:1100px){ .classmates-wall{ column-count:3; } }
@media (max-width:760px){ .classmates-wall{ column-count:2; } }

.classmate{ break-inside:avoid; margin-bottom:30px; opacity:0; transform:translateY(16px); transition:opacity .6s var(--ease-museum), transform .6s var(--ease-museum); }
.classmate.in-view{ opacity:1; transform:translateY(0); }
.classmate-frame{
  background:var(--paper); padding:10px 10px 16px; box-shadow:var(--shadow-frame);
  border-radius:2px; cursor:pointer; transition:transform .45s var(--ease-museum), box-shadow .45s var(--ease-museum);
}
.classmate:nth-child(4n+1) .classmate-frame{ transform:rotate(-1.1deg); }
.classmate:nth-child(4n+2) .classmate-frame{ transform:rotate(.9deg); }
.classmate:nth-child(4n+3) .classmate-frame{ transform:rotate(-.6deg); }
.classmate:nth-child(4n+4) .classmate-frame{ transform:rotate(1.3deg); }
.classmate-frame:hover{ transform:scale(1.035) rotate(0deg) !important; box-shadow:0 8px 14px rgba(20,14,6,.2), 0 34px 50px -16px rgba(20,14,6,.5); z-index:3; position:relative; }
.classmate-photo{ width:100%; overflow:hidden; border-radius:1px; background:linear-gradient(135deg,#e9e2d4,#d8cdb8); }
.classmate-photo img{ width:100%; height:100%; object-fit:cover; display:block; }
.classmate-photo.ar-tall{ aspect-ratio:3/4; }
.classmate-photo.ar-square{ aspect-ratio:1/1; }
.classmate-photo.ar-wide{ aspect-ratio:5/4; }
.classmate .plaque{ padding-top:12px; }

/* ==========================================================================
   9. SECRET ROOM — Behind the Scenes
   ========================================================================== */
#room-secret{ background:radial-gradient(ellipse 70% 60% at 50% 0%, rgba(92,31,38,.10), transparent 60%); }
#room-secret .room-eyebrow{ color:var(--wine); }
#room-secret .room-eyebrow::after{ background:var(--wine-light); }
#room-secret .room-title{ color:var(--wine); }
#room-secret .frame{ border:1px solid rgba(92,31,38,.15); }

/* ==========================================================================
   10. FINAL HALL
   ========================================================================== */
#room-final{ text-align:center; }
.final-frame{ max-width:560px; margin:44px auto 0; padding:20px 20px 26px; background:var(--paper); box-shadow:var(--shadow-frame); border-radius:2px; }
.final-frame .frame-photo{ aspect-ratio:16/10; }
.final-closing{ font-family:var(--font-quote); font-style:italic; font-size:clamp(1.3rem,3.4vw,2rem); color:var(--ink); max-width:640px; margin:52px auto 0; line-height:1.6; }
.final-farewell{ max-width:640px; margin:50px auto 0; padding:36px 34px; background:var(--wall-deep); border-left:3px solid var(--brass); border-radius:0 10px 10px 0; text-align:left; }
.final-farewell h3{ font-family:var(--font-label); font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--brass-dark); margin-bottom:14px; }
.final-farewell p{ font-family:var(--font-quote); font-size:1.15rem; font-style:italic; color:var(--ink); line-height:1.75; white-space:pre-line; }
.final-farewell .sign{ margin-top:18px; font-family:var(--font-display); font-size:1rem; color:var(--ink-soft); }
.final-quiet-note{ margin-top:60px; font-family:var(--font-label); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-faint); }

/* ==========================================================================
   11. LIGHTBOX
   ========================================================================== */
.lightbox{
  position:fixed; inset:0; z-index:200; background:rgba(10,7,4,.94);
  display:flex; align-items:center; justify-content:center;
  opacity:0; visibility:hidden; transition:opacity .5s var(--ease-museum), visibility .5s var(--ease-museum);
}
.lightbox.open{ opacity:1; visibility:visible; }
.lightbox-stage{ max-width:min(88vw, 980px); max-height:82vh; text-align:center; transform:scale(.92); transition:transform .55s var(--ease-museum); }
.lightbox.open .lightbox-stage{ transform:scale(1); }
.lightbox-stage img{ max-height:70vh; max-width:100%; margin:0 auto; box-shadow:0 30px 70px -20px rgba(0,0,0,.7); border-radius:2px; background:linear-gradient(135deg,#e9e2d4,#d8cdb8); }
.lightbox-caption{ color:var(--paper); margin-top:22px; }
.lightbox-caption .p-title{ font-family:var(--font-display); font-size:1.3rem; font-weight:600; }
.lightbox-caption .p-desc{ font-family:var(--font-quote); font-style:italic; color:#cfc6b8; margin-top:6px; }
.lightbox-caption .p-date{ font-family:var(--font-label); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--brass-light); margin-top:10px; }

.lb-btn{ position:absolute; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.22); color:var(--paper); width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background .3s, transform .3s; }
.lb-btn:hover{ background:rgba(255,255,255,.18); transform:scale(1.06); }
.lb-close{ top:22px; right:22px; }
.lb-prev{ left:18px; top:50%; transform:translateY(-50%); }
.lb-next{ right:18px; top:50%; transform:translateY(-50%); }
.lb-btn svg{ width:18px; height:18px; }
@media (max-width:640px){ .lb-prev{left:8px;} .lb-next{right:8px;} .lb-btn{width:40px;height:40px;} }

/* ==========================================================================
   12. MUSEUM MAP
   ========================================================================== */
.map-toggle{
  position:fixed; right:26px; bottom:26px; z-index:60;

  background:var(--ink); color:var(--paper);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  border:1px solid rgba(255,255,255,.15); box-shadow:var(--shadow-frame);
  transition:transform .3s ease, opacity .8s ease, visibility .8s ease;
}
.map-toggle:hover{ transform:translateY(-3px) scale(1.04); }
.map-toggle svg{ width:19px; height:19px; }
.map-toggle span{ font-family:var(--font-label); font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; }
@media (max-width:880px){ .map-toggle{ bottom:92px; } }
@media (max-width:680px){

  .map-toggle svg{ width:16px; height:16px; }
  .map-toggle span{ font-size:7.5px; }
}

.map-modal{

  display:flex; align-items:center; justify-content:center; padding:24px;
  opacity:0; visibility:hidden; transition:opacity .4s ease, visibility .4s ease;
}
.map-modal.open{ opacity:1; visibility:visible; }
.map-panel{
  background:var(--paper); border-radius:16px; max-width:760px; width:100%;
  padding:34px 30px 30px; box-shadow:0 40px 90px -20px rgba(0,0,0,.6);
  position:relative; max-height:88vh; overflow:auto;
}
.map-close{
  position:absolute; top:18px; right:18px; width:36px; height:36px; border-radius:50%;

}
.map-close:hover{ background:var(--wall-shadow); }
.map-title{ font-family:var(--font-display); font-weight:600; font-size:1.5rem; text-align:center; }
.map-subtitle{ font-family:var(--font-quote); font-style:italic; color:var(--ink-soft); text-align:center; margin-top:6px; font-size:.95rem; }

.map-plan{ position:relative; margin-top:30px; aspect-ratio:16/10; width:100%; }
.map-plan svg{ position:absolute; inset:0; width:100%; height:100%; }
.map-room{
  position:absolute; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; align-items:center; gap:4px;
  background:var(--wall); border:1px solid var(--wall-shadow); border-radius:10px;
  padding:10px 14px; min-width:96px; text-align:center;
  transition:transform .3s ease, box-shadow .3s ease, border-color .3s ease;
  box-shadow:0 6px 16px rgba(20,14,6,.1);
}
.map-room:hover{ transform:translate(-50%,-50%) scale(1.06); border-color:var(--brass); box-shadow:0 10px 24px rgba(20,14,6,.22); }
.map-room .num{ font-family:var(--font-label); font-size:9.5px; letter-spacing:.12em; color:var(--brass); }
.map-room .name{ font-family:var(--font-display); font-size:12.5px; font-weight:600; line-height:1.25; }
.map-room.is-final{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
.map-room.is-final .num{ color:var(--brass-light); }
.map-room.is-secret{ background:var(--wine); color:var(--paper); border-color:var(--wine); }
.map-room.is-secret .num{ color:#e9b8bd; }
@media (max-width:680px){
  /* the hand-placed floor-plan positions only work with enough width;
     on phones, fall back to a clean, evenly-spaced grid instead */
  .map-plan{ aspect-ratio:auto; display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
  .map-plan svg{ display:none; }
  .map-room{
    position:static; transform:none; width:100%; min-width:0;
    padding:16px 10px; box-sizing:border-box;

function placeholderDataURI(label){
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="600" height="750" viewBox="0 0 600 750">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ece3d2"/><stop offset="1" stop-color="#d6c9ab"/>
        </linearGradient>
      </defs>
      <rect width="600" height="750" fill="url(#g)"/>
      <g opacity="0.55" stroke="#8a7550" stroke-width="2" fill="none">
        <rect x="60" y="70" width="480" height="610"/>
        <circle cx="300" cy="330" r="70"/>
        <path d="M180 470 L260 380 L330 440 L420 340 L490 470 Z"/>
      </g>
      <text x="300" y="660" font-family="Georgia, serif" font-size="22" fill="#5c5148" text-anchor="middle" font-style="italic">${label}</text>
      <text x="300" y="690" font-family="Arial, sans-serif" font-size="13" letter-spacing="2" fill="#a9834f" text-anchor="middle">PHOTO COMING SOON</text>
    </svg>`;
  return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
}
function handleImgError(imgEl){
  imgEl.onerror = null;
  imgEl.src = placeholderDataURI(imgEl.dataset.label || imgEl.alt || 'Untitled');
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function escapeAttr(str){ return escapeHtml(str).replace(/`/g,'&#96;'); }
function filePath(folder, file){ return folder ? (folder + '/' + file) : file; }

const ROOM_LABELS = {}; // id -> display name, filled while rendering

function buildFrameGrid(photos, folder, galleryIdAttr){
  return photos.map((p,i) => `
    <figure class="exhibit${p.featured ? ' featured' : ''}" data-gallery="${galleryIdAttr}" data-index="${i}">
      <div class="frame" tabindex="0" role="button" aria-label="Open photo: ${escapeAttr(p.title)}">
        ${p.featured ? '<span class="featured-tag">Masterpiece</span>' : ''}
        <span class="spotlight" aria-hidden="true"></span>
        <div class="frame-photo">
          <img loading="lazy" src="${filePath(folder, p.file)}" alt="${escapeAttr(p.title)}" data-label="${escapeAttr(p.title)}" onerror="handleImgError(this)">
        </div>
      </div>
      <figcaption class="plaque">
        <div class="p-title">${escapeHtml(p.title)}</div>
        ${p.desc ? `<div class="p-desc">${escapeHtml(p.desc)}</div>` : ''}
        ${p.date ? `<div class="p-date">${escapeHtml(p.date)}</div>` : ''}
      </figcaption>
    </figure>
  `).join('');
}

function renderGalleryRoom(g){
  ROOM_LABELS[g.id] = g.name;
  return `
  <section class="room" id="room-${g.id}" data-room="${g.id}" data-theme="${g.theme}" aria-label="${escapeAttr(g.name)}">
    <div class="room-eyebrow">Gallery ${g.number}</div>
    <h2 class="room-title">${escapeHtml(g.name)}</h2>
    <p class="room-desc">${escapeHtml(g.description)}</p>
    <div class="wall-quote">
      <p>${escapeHtml(g.quote)}</p>
      <cite>${escapeHtml(g.quoteAuthor)}</cite>
    </div>
    <div class="frame-grid">${buildFrameGrid(g.photos, g.folder, g.id)}</div>
  </section>`;
}

const AR_CLASSES = ['ar-tall','ar-square','ar-wide'];
function renderClassmatesRoom(list, folder){
  ROOM_LABELS['classmates'] = 'Hall of Classmates';
  const grid = list.map((p,i) => {
    const ar = AR_CLASSES[i % AR_CLASSES.length];
    return `
    <div class="classmate exhibit" data-gallery="classmates" data-index="${i}">
      <div class="classmate-frame frame" tabindex="0" role="button" aria-label="Open portrait of ${escapeAttr(p.name)}">
        <div class="classmate-photo ${ar}">
          <img loading="lazy" src="${filePath(folder, p.file)}" alt="Portrait of ${escapeAttr(p.name)}" data-label="${escapeAttr(p.name)}" onerror="handleImgError(this)">
        </div>
        <div class="plaque">
          <div class="p-title">${escapeHtml(p.name)}</div>
          <div class="p-desc">“${escapeHtml(p.line)}”</div>
        </div>
      </div>
    </div>`;
  }).join('');
  return `
  <section class="room" id="room-classmates" data-room="classmates" data-theme="light" aria-label="Hall of Classmates">
    <div class="room-eyebrow">Gallery 07</div>
    <h2 class="room-title">Hall of Classmates</h2>
    <p class="room-desc">Every face that made this year what it was. Hung the way a real museum hangs its favourite portraits — a little imperfect, on purpose.</p>
    <div class="classmates-wall">${grid}</div>
  </section>`;
}

function renderSecretRoom(list, folder){
  ROOM_LABELS['secret'] = 'Behind the Scenes';
  return `
  <section class="room" id="room-secret" data-room="secret" data-theme="light" aria-label="Behind the Scenes">
    <div class="room-eyebrow">Unlisted Gallery</div>
    <h2 class="room-title">Behind the Scenes</h2>
    <p class="room-desc">You weren't supposed to find this room. Since you did — welcome to the gallery we don't put on the map.</p>
    <div class="frame-grid">${buildFrameGrid(list, folder, 'secret')}</div>
  </section>`;
}

function renderFinalRoom(data){
  ROOM_LABELS['final'] = 'Final Hall';
  const p = data.finalPhoto;
  return `
  <section class="room" id="room-final" data-room="final" data-theme="light" aria-label="Final Hall">
    <div class="room-eyebrow">Final Hall</div>
    <h2 class="room-title">The Museum Closes Here</h2>
    <div class="final-frame">
      <div class="frame-photo">
        <img loading="lazy" src="${filePath(data.finalFolder, p.file)}" alt="${escapeAttr(p.title)}" data-label="${escapeAttr(p.title)}" onerror="handleImgError(this)">
      </div>
      <figcaption class="plaque">
        <div class="p-title">${escapeHtml(p.title)}</div>
        ${p.date ? `<div class="p-date">${escapeHtml(p.date)}</div>` : ''}
      </figcaption>
    </div>
    <p class="final-closing">${escapeHtml(data.finalClosing)}</p>
    <div class="final-farewell">
      <h3>A Farewell Message</h3>
      <p>${escapeHtml(data.farewellMessage)}</p>
      <div class="sign">${escapeHtml(data.farewellSignature)}</div>
    </div>
    <p class="final-quiet-note">Thank you for visiting</p>
  </section>`;
}

function renderAll(){
  let html = '';
  MUSEUM_DATA.galleries.forEach(g => { html += renderGalleryRoom(g); });
  html += renderClassmatesRoom(MUSEUM_DATA.classmates, MUSEUM_DATA.classmatesFolder);
  html += renderSecretRoom(MUSEUM_DATA.secretPhotos, MUSEUM_DATA.secretFolder);
  html += renderFinalRoom(MUSEUM_DATA);
  roomsContainer.innerHTML = html;

  // Sidebar navigation, following ROOM_ORDER
  let navHtml = '';
  let n = 1;
  ROOM_ORDER.forEach(id => {
    if(id === 'final') return; // final hall added last, after secret
    const num = String(n++).padStart(2,'0');
    navHtml += `<li><button class="nav-item" data-target="${id}"><span class="num">${num}</span><span>${escapeHtml(ROOM_LABELS[id])}</span></button></li>`;
  });
  navHtml += `<li><button class="nav-item secret" id="secretNavItem" data-target="secret" style="display:none"><span class="num">✦</span><span>Behind the Scenes</span></button></li>`;
  navHtml += `<li><button class="nav-item" data-target="final"><span class="num">${String(n).padStart(2,'0')}</span><span>Final Hall</span></button></li>`;
  navList.innerHTML = navHtml;
  navMobile.innerHTML = navHtml.replace(/<\/?li>/g,'');

  renderMap();
}

function renderMap(){
  let n = 1;
  let mapHtml = '';
  ROOM_ORDER.forEach(id => {
    const pos = MAP_POSITIONS[id];
    if(!pos) return;
    const isFinal = id === 'final';
    const num = isFinal ? '✦' : String(n++).padStart(2,'0');
    mapHtml += `<button class="map-room${isFinal ? ' is-final' : ''}" style="left:${pos.x}%; top:${pos.y}%;" data-target="${id}">
      <span class="num">${num}</span><span class="name">${escapeHtml(ROOM_LABELS[id])}</span>
    </button>`;
  });
  // secret room only appears on the map once unlocked
  if(document.getElementById('secretNavItem') && document.getElementById('secretNavItem').style.display !== 'none'){
    const pos = MAP_POSITIONS.secret;
    mapHtml += `<button class="map-room is-secret" style="left:${pos.x}%; top:${pos.y}%;" data-target="secret">
      <span class="num">✦</span><span class="name">Behind the Scenes</span>
    </button>`;
  }
  // remove previously injected room buttons, keep the SVG corridor lines
  mapPlan.querySelectorAll('.map-room').forEach(el => el.remove());
  mapPlan.insertAdjacentHTML('beforeend', mapHtml);
}
renderAll();

let currentRoom = MUSEUM_DATA.galleries[0].id;

const hallwayLabel = document.getElementById('hallwayLabel');
const museumEl = document.getElementById('museum');
const hamburgerBtn = document.getElementById('hamburgerBtn');
const navRail = document.getElementById('navRail');
const navBackdrop = document.getElementById('navBackdrop');

function openDrawer(){
  navRail.classList.add('open');
  navBackdrop.classList.add('open');
  hamburgerBtn.setAttribute('aria-expanded', 'true');
}
function closeDrawer(){
  navRail.classList.remove('open');
  navBackdrop.classList.remove('open');
  hamburgerBtn.setAttribute('aria-expanded', 'false');
}
hamburgerBtn.addEventListener('click', openDrawer);
document.getElementById('navCloseBtn').addEventListener('click', closeDrawer);
navBackdrop.addEventListener('click', closeDrawer);

function activateRoom(id){
  const target = document.getElementById('room-' + id);
  if(!target) return;
  document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
  void target.offsetWidth; // restart enter animation
  target.classList.add('active');
  currentRoom = id;

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.target === id);
  });
  museumEl.classList.toggle('is-final', id === 'final');
  hamburgerBtn.classList.toggle('is-final', id === 'final');
  navRail.classList.toggle('is-final', id === 'final');

  window.scrollTo({ top:0, behavior:'auto' });
  refreshObservedElements();
}

function goToRoom(id, opts){
  opts = opts || {};
  if(id === currentRoom && document.getElementById('room-'+id).classList.contains('active')) return;
  if(opts.walk === false){ activateRoom(id); return; }

  hallwayLabel.textContent = 'Walking to ' + (ROOM_LABELS[id] || 'the next room') + '…';
  hallway.classList.add('active');
  window.setTimeout(() => { activateRoom(id); }, 600);
  window.setTimeout(() => { hallway.classList.remove('active'); }, 1050);
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.nav-item, .map-room');
  if(btn){
    goToRoom(btn.dataset.target);
    closeMap();
    closeDrawer();
  }
  if(e.target.closest('#navBrand')){ showEntrance(); closeDrawer(); }
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape' && navRail.classList.contains('open')) closeDrawer();
});

/* ============================================================================
   SCROLL-REVEAL ANIMATIONS
   ============================================================================ */
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('in-view');
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold:.12 });

function refreshObservedElements(){
  document.querySelectorAll('#room-' + currentRoom + ' .exhibit, #room-' + currentRoom + ' .classmate')
    .forEach(el => revealObserver.observe(el));
}

const lightbox   = document.getElementById('lightbox');
const lbImage    = document.getElementById('lbImage');
const lbTitle    = document.getElementById('lbTitle');
const lbDesc     = document.getElementById('lbDesc');
const lbDate     = document.getElementById('lbDate');

let activeGalleryPhotos = [];
let activeFolder = '';
let activeIndex = 0;

function galleryInfoById(id){
  if(id === 'secret') return { photos: MUSEUM_DATA.secretPhotos, folder: MUSEUM_DATA.secretFolder };
  if(id === 'classmates'){
    const photos = MUSEUM_DATA.classmates.map(c => ({ file:c.file, title:c.name, desc:c.line, date:'Portrait' }));
    return { photos, folder: MUSEUM_DATA.classmatesFolder };
  }
  const g = MUSEUM_DATA.galleries.find(g => g.id === id);
  return g ? { photos: g.photos, folder: g.folder } : { photos: [], folder:'' };
}

function openLightbox(galleryId, index){
  const info = galleryInfoById(galleryId);
  activeGalleryPhotos = info.photos;
  activeFolder = info.folder;
  activeIndex = index;
  renderLightbox();
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
  lbCloseBtn.focus();
}
function renderLightbox(){
  const p = activeGalleryPhotos[activeIndex];
  if(!p) return;
  lbImage.src = filePath(activeFolder, p.file);
  lbImage.alt = p.title;
  lbImage.dataset.label = p.title;
  lbImage.onerror = () => handleImgError(lbImage);
  lbTitle.textContent = p.title;
  lbDesc.textContent = p.desc;
  lbDate.textContent = p.date;
}
function closeLightbox(){
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}
function stepLightbox(dir){
  if(!activeGalleryPhotos.length) return;
  activeIndex = (activeIndex + dir + activeGalleryPhotos.length) % activeGalleryPhotos.length;
  renderLightbox();
}

const lbCloseBtn = document.getElementById('lbClose');
lbCloseBtn.addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => stepLightbox(-1));
document.getElementById('lbNext').addEventListener('click', () => stepLightbox(1));
lightbox.addEventListener('click', (e) => { if(e.target === lightbox) closeLightbox(); });

document.addEventListener('keydown', (e) => {
  if(!lightbox.classList.contains('open')) return;
  if(e.key === 'Escape') closeLightbox();
  if(e.key === 'ArrowLeft') stepLightbox(-1);
  if(e.key === 'ArrowRight') stepLightbox(1);
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape' && mapModal.classList.contains('open')) closeMap();
});

document.addEventListener('click', (e) => {
  const exhibit = e.target.closest('.exhibit');
  if(!exhibit) return;
  const galleryId = exhibit.dataset.gallery;
  const index = parseInt(exhibit.dataset.index, 10);
  openLightbox(galleryId, index);
  handleEasterEggClick(galleryId, index);
});
document.addEventListener('keydown', (e) => {
  if(e.key !== 'Enter' && e.key !== ' ') return;
  const frame = e.target.closest('.frame');
  if(!frame) return;
  e.preventDefault();
  frame.click();
});

/* ============================================================================
   EASTER EGG — "Behind the Scenes"
   ============================================================================ */
let secretClicks = 0;
let secretUnlocked = false;

function handleEasterEggClick(galleryId, index){
  if(secretUnlocked) return;
  if(galleryId === EASTER_EGG.galleryId && index === EASTER_EGG.photoIndex){
    secretClicks++;
    if(secretClicks >= EASTER_EGG.clicksNeeded){
      unlockSecretRoom();
    }
  }
}
function unlockSecretRoom(){
  secretUnlocked = true;
  const item = document.getElementById('secretNavItem');
  if(item) item.style.display = '';
  closeLightbox();
  renderMap();
  window.setTimeout(() => goToRoom('secret'), 300);
}

/* ============================================================================
   ENTRANCE — doors open, camera pushes in
   ============================================================================ */
const entrance = document.getElementById('entrance');
const doorFrame = document.getElementById('doorFrame');
const facade = document.getElementById('facade');
const beginBtn = document.getElementById('beginTourBtn');
let entering = false;

function beginTour(){
  if(entering) return;
  entering = true;
  beginBtn.setAttribute('disabled','');
  tryPlayAudio();
  doorFrame.classList.add('opening');
  facade.classList.add('camera-move');
  window.setTimeout(() => {
    entrance.classList.add('hidden');
    museumEl.setAttribute('aria-hidden', 'false');
    activateRoom(MUSEUM_DATA.galleries[0].id);
  }, 1550);
}
function showEntrance(){
  entrance.classList.remove('hidden');
  museumEl.setAttribute('aria-hidden', 'true');
  doorFrame.classList.remove('opening');
  facade.classList.remove('camera-move');
  beginBtn.removeAttribute('disabled');
  entering = false;
}
beginBtn.addEventListener('click', beginTour);

/* ============================================================================
   AMBIENT AUDIO
   ============================================================================ */
const ambientAudio = document.getElementById('ambientAudio');
let audioOn = false;

// two icon states: a muted speaker (crossed out) and a playing speaker (sound waves)
const SOUND_ICON_MUTED = '<path d="M11 5 6 9H2v6h4l5 4V5Z"/><line x1="16" y1="9" x2="21" y2="15"/><line x1="21" y1="9" x2="16" y2="15"/>';
const SOUND_ICON_PLAYING = '<path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.8 8.5a5 5 0 0 1 0 7"/><path d="M18.5 6a8.5 8.5 0 0 1 0 12"/>';

function setAudioUI(){
  document.getElementById('soundLabelEntrance').textContent = audioOn ? 'Sound on' : 'Sound off';
  document.getElementById('soundToggleEntrance').setAttribute('aria-pressed', String(audioOn));
  document.getElementById('soundLabelRail').textContent = audioOn ? 'Mute music' : 'Play music';
  document.getElementById('soundToggleRail').setAttribute('aria-pressed', String(audioOn));
  document.getElementById('soundIconEntrance').innerHTML = audioOn ? SOUND_ICON_PLAYING : SOUND_ICON_MUTED;
  document.getElementById('soundIconRail').innerHTML = audioOn ? SOUND_ICON_PLAYING : SOUND_ICON_MUTED;
}
function tryPlayAudio(){
  if(!audioOn) return;
  ambientAudio.volume = 0.35;
  ambientAudio.play().catch(() => {});
}
function toggleAudio(){
  audioOn = !audioOn;
  if(audioOn){ tryPlayAudio(); } else { ambientAudio.pause(); }
  setAudioUI();
}
document.getElementById('soundToggleEntrance').addEventListener('click', toggleAudio);
document.getElementById('soundToggleRail').addEventListener('click', toggleAudio);
setAudioUI();

/* ============================================================================
   ENTRANCE DUST MOTES
   ============================================================================ */
(function seedMotes(){
  const container = document.getElementById('motes');
  const count = window.innerWidth < 600 ? 10 : 18;
  for(let i=0;i<count;i++){
    const m = document.createElement('span');
    m.className = 'mote';
    m.style.left = Math.random()*100 + '%';
    m.style.animationDuration = (14 + Math.random()*14) + 's';
    m.style.animationDelay = (Math.random()*14) + 's';
    container.appendChild(m);
  }
})();

window.addEventListener('load', () => { refreshObservedElements(); });
</script>
